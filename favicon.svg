<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" ry="6" fill="#336699"/>
  <!-- Subtle inner border for that 2005 beveled look -->
  <rect x="1" y="1" width="30" height="30" rx="5" ry="5" fill="none" stroke="#4A7FB5" stroke-width="0.5"/>
  <!-- Letter R -->
  <text x="16" y="23" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">R</text>
  <!-- Small sparkle dot for personality -->
  <circle cx="25" cy="7" r="1.5" fill="#B0C4DE"/>
</svg>
